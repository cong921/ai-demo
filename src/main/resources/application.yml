server:
  port: 8080

spring:
  application:
    name: ai-demo

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7


app:
  auto-reply:
    enabled: true
    knowledge-base:
      profile-path: classpath:knowledge/profile.md
  browser-bot:
    chrome-path: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    poll-interval-seconds: 3
    headless: false
