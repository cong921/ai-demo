server:
  port: 8080

spring:
  application:
    name: ai-demo

  datasource:
    url: jdbc:mysql://localhost:3306/ai_demo?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ^YYdG@*9
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

app:
  auto-reply:
    enabled: true
    knowledge-base:
      profile-path: classpath:knowledge/profile.md
